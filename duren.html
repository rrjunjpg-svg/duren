<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>html</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Nunito',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe082,#ffca28,#ffb300);
    padding:20px;
}

.card{
    text-align:center;
}

.durian{
    font-size:300px;
    line-height:1;
    animation:goyang 2s infinite;
}

.text{
    margin-top:20px;
    color:#6d4c41;
    font-size:1.8rem;
    font-weight:900;
}

@keyframes goyang{
    0%{transform:rotate(-5deg);}
    50%{transform:rotate(5deg);}
    100%{transform:rotate(-5deg);}
}
</style>
</head>
<body>
<div class="card">
<img class="durian" src="duren.png">
<div class="text">
ini duren buat bubub my little hunny bunny mwah 💖
</div>
</div>
</body>
</html>
